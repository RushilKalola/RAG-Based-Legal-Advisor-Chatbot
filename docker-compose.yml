services:
  app:
    build: .
    container_name: rag_legal_chatbot
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    command: >
      uvicorn app.api.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4

  streamlit:
    build: .
    container_name: streamlit_ui
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    env_file:
      - .env
    command: >
      streamlit run streamlit_app.py
      --server.port 8501
      --server.address 0.0.0.0